AWSTemplateFormatVersion: "2010-09-09"
Description: >
  PeopleTasks deploy infrastructure: GitHub Actions OIDC role, ECR repo,
  ECS Fargate cluster/service, ALB, and supporting resources.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for ALB and Fargate tasks (at least 2 AZs)

  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: PostgreSQL connection string

  NextAuthSecret:
    Type: String
    NoEcho: true
    Description: NextAuth.js secret for session encryption

  NextAuthUrl:
    Type: String
    Description: Public URL of the app (e.g. https://tasks.radiusgroup.com)

  CronSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Shared secret for cron endpoint auth

  GoogleClientId:
    Type: String
    Default: ""

  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ""

  S3Bucket:
    Type: String
    Default: ""

  GitHubOrg:
    Type: String
    Default: Radius-Group-Systems

  GitHubRepo:
    Type: String
    Default: people-tasks

Resources:

  # --- ECR Repository ---
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: people-tasks
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  # --- GitHub Actions Deploy Role ---
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-people-tasks-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: deploy-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !GetAtt EcrRepository.Arn
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/people-tasks/*"
              - Effect: Allow
                Action:
                  - ecs:DescribeClusters
                Resource: !GetAtt EcsCluster.Arn

  # --- ECS Cluster ---
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: people-tasks
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # --- Log Group ---
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/people-tasks
      RetentionInDays: 30

  # --- Task Execution Role (ECR pull + logs) ---
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: people-tasks-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # --- Task Role (app permissions) ---
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: people-tasks-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: app-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${S3Bucket}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${S3Bucket}"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: "*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"

  # --- ALB Security Group ---
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB for people-tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  # --- Task Security Group ---
  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks for people-tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  # --- ALB ---
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: people-tasks-alb
      Scheme: internet-facing
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: people-tasks-tg
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /api/auth/session
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # --- Task Definition ---
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: people-tasks
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/people-tasks:latest"
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: DATABASE_URL
              Value: !Ref DatabaseUrl
            - Name: NEXTAUTH_SECRET
              Value: !Ref NextAuthSecret
            - Name: NEXTAUTH_URL
              Value: !Ref NextAuthUrl
            - Name: CRON_SECRET
              Value: !Ref CronSecret
            - Name: GOOGLE_CLIENT_ID
              Value: !Ref GoogleClientId
            - Name: GOOGLE_CLIENT_SECRET
              Value: !Ref GoogleClientSecret
            - Name: S3_BUCKET
              Value: !Ref S3Bucket
            - Name: AWS_REGION
              Value: !Ref "AWS::Region"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: app

  # --- ECS Service ---
  EcsService:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: people-tasks-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 0
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref TaskSecurityGroup
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroup

  # --- Notification Cron (EventBridge + Lambda) ---
  CronLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: people-tasks-cron-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  CronLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: people-tasks-notification-cron
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt CronLambdaRole.Arn
      Environment:
        Variables:
          APP_URL: !Ref NextAuthUrl
          CRON_SECRET: !Ref CronSecret
      Code:
        ZipFile: |
          const https = require('https');
          const http = require('http');
          exports.handler = async () => {
            const url = new URL('/api/notifications/process', process.env.APP_URL);
            const mod = url.protocol === 'https:' ? https : http;
            return new Promise((resolve, reject) => {
              const req = mod.request(url, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.CRON_SECRET}`,
                  'Content-Type': 'application/json',
                },
              }, (res) => {
                let body = '';
                res.on('data', (chunk) => body += chunk);
                res.on('end', () => {
                  console.log(`Status: ${res.statusCode}, Body: ${body}`);
                  resolve({ statusCode: res.statusCode, body });
                });
              });
              req.on('error', reject);
              req.end();
            });
          };

  CronRule:
    Type: AWS::Events::Rule
    Properties:
      Name: people-tasks-notification-cron
      ScheduleExpression: "rate(15 minutes)"
      State: ENABLED
      Targets:
        - Id: cron-lambda
          Arn: !GetAtt CronLambda.Arn

  CronLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CronLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CronRule.Arn

Outputs:
  DeployRoleArn:
    Description: GitHub Actions deploy role ARN — add as repo secret AWS_DEPLOY_ROLE_ARN
    Value: !GetAtt GitHubActionsRole.Arn

  AlbDnsName:
    Description: ALB DNS name — point your domain here
    Value: !GetAtt LoadBalancer.DNSName

  EcrRepositoryUri:
    Description: ECR repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/people-tasks"

  ClusterName:
    Description: ECS cluster name
    Value: !Ref EcsCluster
