services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ptasks
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: people_tasks
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptasks -d people_tasks"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
